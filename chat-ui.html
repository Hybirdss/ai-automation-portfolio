<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nexframe AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --ink: #1d1d1f;
  --ink-2: #424245;
  --ink-3: #86868b;
  --ink-4: #d2d2d7;
  --surface: #ffffff;
  --surface-2: #f5f5f7;
  --surface-3: #fbfbfd;
  --body-bg: #f0f0f2;
  --blue: #0071e3;
  --green: #34c759;
  --radius-bubble: 20px;
  --radius-card: 24px;
  --radius-pill: 50px;
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ── Dark theme (default) ── */
[data-theme="dark"] {
  --ink: #e4e4e7;
  --ink-2: #a1a1aa;
  --ink-3: #71717a;
  --ink-4: #3f3f46;
  --surface: #18181b;
  --surface-2: #27272a;
  --surface-3: #1f1f23;
  --body-bg: #09090b;
}

/* ── Light theme ── */
[data-theme="light"] {
  --ink: #1d1d1f;
  --ink-2: #52525b;
  --ink-3: #6b6b70;
  --ink-4: #71717a;
  --surface: #ffffff;
  --surface-2: #f5f5f7;
  --surface-3: #fbfbfd;
  --body-bg: #f0f0f2;
}
[data-theme="light"] .msg-time { color: #6b6b70; }
[data-theme="light"] .chat-hdr-status { color: #52525b; }
[data-theme="light"] .chat-footer-text { color: #71717a; }
[data-theme="light"] .sug-pill { border-color: rgba(0,0,0,0.15); }

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--body-bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.chat-card {
  width: 100%;
  max-width: 420px;
  height: 680px;
  background: var(--surface);
  border-radius: var(--radius-card);
  box-shadow:
    0 0 0 0.5px rgba(0,0,0,0.04),
    0 2px 4px rgba(0,0,0,0.02),
    0 12px 32px rgba(0,0,0,0.06),
    0 32px 64px rgba(0,0,0,0.04);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.chat-hdr {
  padding: 16px 20px;
  background: var(--surface-3);
  border-bottom: 0.5px solid rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  backdrop-filter: saturate(180%) blur(20px);
  z-index: 2;
}

.chat-avatar {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.chat-avatar svg { width: 22px; height: 22px; }
.chat-hdr-info { flex: 1; }

.chat-hdr-name {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--ink);
  line-height: 1.2;
}

.chat-hdr-status {
  font-size: 12px;
  color: var(--ink-3);
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 2px;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.85); }
}

.chat-hdr-close {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(0,0,0,0.04);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s ease;
}
.chat-hdr-close:hover { background: rgba(0,0,0,0.08); }
.chat-hdr-close svg { width: 12px; height: 12px; color: var(--ink-3); }

.chat-msgs {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 16px 8px;
  scroll-behavior: smooth;
  overscroll-behavior: contain;
}

.chat-msgs::-webkit-scrollbar { width: 5px; }
.chat-msgs::-webkit-scrollbar-track { background: transparent; }
.chat-msgs::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 3px; }
[data-theme="dark"] .chat-msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

/* Theme toggle button */
.theme-toggle {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(0,0,0,0.04);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s ease;
  flex-shrink: 0;
}
.theme-toggle:hover { background: rgba(0,0,0,0.08); }
[data-theme="dark"] .theme-toggle { background: rgba(255,255,255,0.06); }
[data-theme="dark"] .theme-toggle:hover { background: rgba(255,255,255,0.1); }
.theme-toggle svg { width: 14px; height: 14px; color: var(--ink-3); }

.msg {
  display: flex;
  gap: 8px;
  margin-bottom: 6px;
  animation: msg-in 0.35s var(--ease-out) both;
  max-width: 100%;
}

@keyframes msg-in {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-bot { align-items: flex-start; }
.msg-user { flex-direction: row-reverse; }

.msg-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--surface-2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}
.msg-icon svg { width: 14px; height: 14px; color: var(--ink-3); }
.msg-user .msg-icon { display: none; }

.msg-bubble {
  padding: 10px 14px;
  font-size: 15px;
  line-height: 1.55;
  letter-spacing: -0.01em;
  max-width: 82%;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.msg-bot .msg-bubble {
  background: var(--surface-2);
  color: var(--ink);
  border-radius: var(--radius-bubble) var(--radius-bubble) var(--radius-bubble) 6px;
}

.msg-user .msg-bubble {
  background: var(--ink);
  color: #fff;
  border-radius: var(--radius-bubble) var(--radius-bubble) 6px var(--radius-bubble);
}

.msg-time {
  font-size: 12px;
  color: var(--ink-4);
  margin: 2px 0 10px;
}
.msg-bot + .msg-time { margin-left: 36px; }
.msg-user + .msg-time { text-align: right; }

.typing-dots {
  display: flex;
  gap: 4px;
  padding: 14px 18px;
  align-items: center;
}
.typing-dots span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--ink-4);
  animation: bounce-dot 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }

@keyframes bounce-dot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 4px 0 8px 36px;
  animation: msg-in 0.4s var(--ease-out) 0.3s both;
  transition: opacity 0.2s ease;
}

.sug-pill {
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-2);
  background: var(--surface);
  border: 1px solid var(--ink-4);
  border-radius: var(--radius-pill);
  padding: 7px 14px;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}
.sug-pill:hover {
  background: var(--surface-2);
  border-color: var(--ink-3);
  color: var(--ink);
}
.sug-pill:active { transform: scale(0.97); }

/* Markdown content in bot messages */
.md p { margin: 0 0 8px; line-height: 1.55; }
.md p:last-child { margin-bottom: 0; }
.md strong { font-weight: 600; color: var(--ink); }
.md a { color: var(--blue); text-decoration: none; }
.md a:hover { text-decoration: underline; }
.md ul, .md ol { padding-left: 18px; margin: 6px 0; }
.md li { margin: 3px 0; color: var(--ink-2); line-height: 1.5; }
.md li strong { color: var(--ink); }
.md h1,.md h2,.md h3 { font-weight: 600; letter-spacing: -0.02em; margin: 10px 0 6px; color: var(--ink); }
.md h3 { font-size: 14px; }

.md code {
  font-family: "SF Mono", SFMono-Regular, Menlo, monospace;
  font-size: 12.5px;
  background: rgba(0,0,0,0.04);
  padding: 2px 5px;
  border-radius: 4px;
}

.md pre {
  background: var(--ink);
  color: var(--surface-2);
  border-radius: 10px;
  padding: 12px 14px;
  overflow-x: auto;
  margin: 8px 0;
  font-size: 12.5px;
}
.md pre code { background: transparent; padding: 0; color: inherit; }

.md table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin: 8px 0;
  font-size: 14px;
  border-radius: 8px;
  overflow: hidden;
  border: 0.5px solid rgba(0,0,0,0.08);
}
.md th {
  background: var(--surface-3);
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--ink-3);
  padding: 7px 10px;
  text-align: left;
  border-bottom: 0.5px solid rgba(0,0,0,0.06);
}
.md td {
  padding: 7px 10px;
  color: var(--ink-2);
  border-bottom: 0.5px solid rgba(0,0,0,0.04);
}
.md tr:nth-child(even) td { background: var(--surface-3); }
.md tr:last-child td { border-bottom: none; }

.chat-input-area {
  padding: 12px 16px;
  background: var(--surface);
  border-top: 0.5px solid rgba(0,0,0,0.06);
  flex-shrink: 0;
}

.chat-input-wrap {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--surface-2);
  border-radius: 22px;
  padding: 6px 6px 6px 16px;
  border: 1px solid transparent;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.chat-input-wrap:focus-within {
  border-color: rgba(0,113,227,0.35);
  box-shadow: 0 0 0 3px rgba(0,113,227,0.08);
}

.chat-textarea {
  flex: 1;
  font-family: var(--font);
  font-size: 15px;
  color: var(--ink);
  border: none;
  background: transparent;
  resize: none;
  outline: none;
  padding: 6px 0;
  line-height: 1.5;
  max-height: 72px;
  overflow-y: auto;
}
.chat-textarea::placeholder { color: var(--ink-3); }
.chat-textarea::-webkit-scrollbar { display: none; }

.chat-send {
  width: 32px;
  height: 32px;
  min-width: 32px;
  border-radius: 50%;
  background: var(--ink);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.12s var(--ease-spring), opacity 0.15s ease;
  flex-shrink: 0;
}
.chat-send:hover { transform: scale(1.06); }
.chat-send:active { transform: scale(0.93); }
.chat-send:disabled { opacity: 0.2; cursor: default; }
.chat-send:disabled:hover { transform: none; }
.chat-send svg { width: 15px; height: 15px; color: #fff; }

.chat-footer-text {
  text-align: center;
  font-size: 12px;
  color: var(--ink-4);
  margin-top: 8px;
}

@media (max-width: 480px) {
  body { padding: 0; background: var(--surface); }
  .chat-card {
    max-width: 100%;
    height: 100vh;
    height: 100dvh;
    border-radius: 0;
    box-shadow: none;
  }
}
</style>
</head>
<body>

<div class="chat-card">
  <div class="chat-hdr">
    <div class="chat-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26z"/>
      </svg>
    </div>
    <div class="chat-hdr-info">
      <div class="chat-hdr-name">Ask AI</div>
      <div class="chat-hdr-status"><span class="status-dot"></span> Online</div>
    </div>
    <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle light/dark mode">
      <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
    <button class="chat-hdr-close" title="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M6 6l12 12M6 18L18 6"/>
      </svg>
    </button>
  </div>

  <div class="chat-msgs" id="msgs"></div>

  <div class="chat-input-area">
    <div class="chat-input-wrap">
      <textarea class="chat-textarea" id="input" rows="1" placeholder="Ask anything..." maxlength="2000"></textarea>
      <button class="chat-send" id="sendBtn" disabled title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
    <div class="chat-footer-text">Nexframe AI Assistant</div>
  </div>
</div>

<script>
const CHAT_PROXY = 'https://nexframe-chat.narukys.workers.dev';
const chatHistory = [];
const msgsEl = document.getElementById('msgs');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
let sending = false;
let suggestionsVisible = true;

let sessionId = sessionStorage.getItem('chat-sid');
if (!sessionId) {
  sessionId = crypto.randomUUID ? crypto.randomUUID() : 'xxxx-xxxx-xxxx'.replace(/x/g, () => ((Math.random()*16)|0).toString(16));
  sessionStorage.setItem('chat-sid', sessionId);
}

function timeAgo(d) {
  const s = Math.floor((Date.now() - d) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + ' min ago';
  return new Date(d).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
}

// Sanitize text to prevent XSS, then apply markdown formatting
function sanitize(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.textContent;
}

function renderMarkdown(raw) {
  // Sanitize first, preserving markdown syntax
  let h = raw
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Code blocks (before other transforms)
  h = h.replace(/```[\s\S]*?```/g, m => {
    const code = m.slice(3,-3).replace(/^\w+\n/,'');
    return '<pre><code>'+code+'</code></pre>';
  });
  h = h.replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, t, u) => {
      const safeUrl = u.startsWith('http') ? u : '#';
      return '<a href="'+safeUrl+'" target="_blank" rel="noopener noreferrer">'+t+'</a>';
    });
  // Bare URLs
  h = h.replace(/(^|[^"=])(https?:\/\/[^\s<]+)/g, (_, pre, url) =>
    pre+'<a href="'+url+'" target="_blank" rel="noopener noreferrer">'+url+'</a>');
  // Tables
  h = h.replace(/((?:^\|.+\|$\n?)+)/gm, block => {
    const rows = block.trim().split('\n').filter(r => r.trim());
    if (rows.length < 2) return block;
    const parse = r => r.split('|').slice(1,-1).map(c => c.trim());
    const hdr = parse(rows[0]);
    const sep = /^[\s|:-]+$/.test(rows[1]);
    const start = sep ? 2 : 1;
    let t = '<table><thead><tr>'+hdr.map(c => '<th>'+c+'</th>').join('')+'</tr></thead><tbody>';
    for (let i = start; i < rows.length; i++) {
      t += '<tr>'+parse(rows[i]).map(c => '<td>'+c+'</td>').join('')+'</tr>';
    }
    return t+'</tbody></table>';
  });
  // Lists
  h = h.replace(/((?:^[-*] .+$\n?)+)/gm, block => {
    const items = block.trim().split('\n').map(l => l.replace(/^[-*] /,''));
    return '<ul>'+items.map(i => '<li>'+i+'</li>').join('')+'</ul>';
  });
  h = h.replace(/((?:^\d+\. .+$\n?)+)/gm, block => {
    const items = block.trim().split('\n').map(l => l.replace(/^\d+\. /,''));
    return '<ol>'+items.map(i => '<li>'+i+'</li>').join('')+'</ol>';
  });
  h = h.replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>');
  if (!h.startsWith('<')) h = '<p>'+h+'</p>';
  return h;
}

const ICON_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26z"/></svg>';

function addMsg(role, content, animate) {
  const row = document.createElement('div');
  row.className = 'msg msg-' + role;
  if (animate === false) row.style.animation = 'none';

  if (role === 'bot') {
    const icon = document.createElement('div');
    icon.className = 'msg-icon';
    icon.insertAdjacentHTML('beforeend', ICON_SVG);
    row.appendChild(icon);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble' + (role === 'bot' ? ' md' : '');
  if (role === 'bot') {
    bubble.insertAdjacentHTML('beforeend', renderMarkdown(content));
  } else {
    bubble.textContent = content;
  }
  row.appendChild(bubble);
  msgsEl.appendChild(row);

  const ts = document.createElement('div');
  ts.className = 'msg-time';
  ts.textContent = timeAgo(Date.now());
  msgsEl.appendChild(ts);
  scrollDown();
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg msg-bot';
  row.id = 'typing';
  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.insertAdjacentHTML('beforeend', ICON_SVG);
  row.appendChild(icon);
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.insertAdjacentHTML('beforeend', '<div class="typing-dots"><span></span><span></span><span></span></div>');
  row.appendChild(bubble);
  msgsEl.appendChild(row);
  scrollDown();
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function scrollDown() {
  requestAnimationFrame(() => msgsEl.scrollTo({ top: msgsEl.scrollHeight, behavior: 'smooth' }));
}

function removeSuggestions() {
  const s = document.getElementById('suggestions');
  if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 200); }
  suggestionsVisible = false;
}

async function send(text) {
  if (!text.trim() || sending) return;
  sending = true;
  sendBtn.disabled = true;
  input.value = '';
  autoGrow();
  if (suggestionsVisible) removeSuggestions();
  addMsg('user', text.trim());
  showTyping();

  try {
    chatHistory.push({role:'user',content:text.trim().slice(0,500)});
    const res = await fetch(CHAT_PROXY, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({messages:chatHistory})
    });
    const data = await res.json();
    hideTyping();
    if(data.error){addMsg('bot',data.error);sending=false;return}
    const reply = data.choices?.[0]?.message?.content || 'Sorry, I could not process that.';
    chatHistory.push({role:'assistant',content:reply});
    addMsg('bot', reply);
  } catch (e) {
    hideTyping();
    addMsg('bot', 'Connection error. Please try again.');
  }
  sending = false;
  sendBtn.disabled = !input.value.trim();
  input.focus();
}

function autoGrow() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 72) + 'px';
  sendBtn.disabled = !input.value.trim() || sending;
}

input.addEventListener('input', autoGrow);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(input.value); }
});
sendBtn.addEventListener('click', () => send(input.value));

// Welcome
addMsg('bot', "Hi! I'm the Nexframe AI assistant. Ask me about our services, pricing, or how we work.", false);

// Suggestions
const sugWrap = document.createElement('div');
sugWrap.className = 'suggestions';
sugWrap.id = 'suggestions';
['What does Nexframe do?', 'How fast can you ship?', 'What are your prices?'].forEach(q => {
  const pill = document.createElement('button');
  pill.className = 'sug-pill';
  pill.textContent = q;
  pill.addEventListener('click', () => send(q));
  sugWrap.appendChild(pill);
});
msgsEl.appendChild(sugWrap);
scrollDown();
input.focus();

// ── Theme toggle ──
(function() {
  var toggle = document.getElementById('theme-toggle');
  var stored = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', stored);
  toggle.querySelector('.sun').style.display = stored === 'dark' ? 'block' : 'none';
  toggle.querySelector('.moon').style.display = stored === 'light' ? 'block' : 'none';

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    toggle.querySelector('.sun').style.display = next === 'dark' ? 'block' : 'none';
    toggle.querySelector('.moon').style.display = next === 'light' ? 'block' : 'none';
  });
})();
</script>
</body>
</html>
